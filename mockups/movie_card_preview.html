<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Now Showing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@700;800&family=Spectral:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap"
    rel="stylesheet"
  />
  <style>
    :root {
      --paper:    oklch(97% 0.012 75);
      --ink:      oklch(22% 0.015 70);
      --ink-soft: oklch(45% 0.015 70);
      --ink-mute: oklch(60% 0.010 70);
      --rule:     oklch(82% 0.012 70);
      --accent:   oklch(56% 0.18 28);

      --space-1: 0.25rem;
      --space-2: 0.5rem;
      --space-3: 0.75rem;
      --space-4: 1rem;
      --space-6: 1.5rem;
      --space-8: 2rem;
      --space-12: 3rem;
      --space-16: 4rem;
      --space-24: 6rem;

      --t-xs: 0.75rem;
      --t-sm: 0.875rem;
      --t-md: 1rem;
      --t-lg: 1.25rem;
      --t-xl: 1.5625rem;
      --t-title: 2.75rem;
      --t-masthead: clamp(2.5rem, 7vw, 5.5rem);

      --ff-display: "Big Shoulders Display", "Arial Narrow", sans-serif;
      --ff-body: "Spectral", Georgia, "Times New Roman", serif;

      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
    }

    * { box-sizing: border-box; }
    html, body { background: var(--paper); }
    body {
      margin: 0;
      color: var(--ink);
      font-family: var(--ff-body);
      font-weight: 400;
      font-size: 18px;
      line-height: 1.5;
      font-feature-settings: "kern", "liga", "onum";
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
    }

    /* Left-indented editorial column — not centered */
    .page {
      max-width: 68rem;
      margin: 0;
      margin-left: clamp(var(--space-6), 9vw, var(--space-24));
      padding: var(--space-16) var(--space-8) var(--space-24) 0;
    }

    /* ---------- Masthead ---------- */
    .masthead {
      padding-bottom: var(--space-6);
      border-bottom: 1px solid var(--ink);
    }
    .masthead h1 {
      font-family: var(--ff-display);
      font-weight: 800;
      font-size: var(--t-masthead);
      line-height: 0.9;
      letter-spacing: -0.01em;
      margin: 0;
    }
    .masthead-tag {
      font-family: var(--ff-body);
      font-style: italic;
      font-size: var(--t-md);
      color: var(--ink-soft);
      margin: var(--space-3) 0 0;
    }
    /* Accent use #1 — masthead date marker */
    .masthead-date {
      color: var(--accent);
      font-style: normal;
      font-weight: 500;
    }

    /* ---------- Control bar ---------- */
    .control-bar {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: var(--space-1);
      margin-top: var(--space-4);
    }
    .control-sentence {
      margin: 0;
      font-family: var(--ff-body);
      font-style: italic;
      font-size: var(--t-md);
      color: var(--ink-soft);
      line-height: 1.7;
      max-width: 42ch;
    }
    .control-sentence.is-transitioning { white-space: nowrap; }

    /* ---------- Date row (editorial, not widget) ---------- */
    .date-bar {
      margin-top: var(--space-4);
      padding-top: var(--space-4);
      border-top: 1px solid var(--rule);
      width: 100%;
    }
    .date-buttons {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-start;
      gap: var(--space-4) var(--space-6);
    }
    .date-button {
      all: unset;
      cursor: pointer;
      font-family: var(--ff-body);
      font-size: var(--t-md);
      color: var(--ink-mute);
      letter-spacing: 0.01em;
      padding: 0.1em 0;
      transition: color 160ms var(--ease-out);
    }
    .date-button:hover { color: var(--ink-soft); }
    .date-button:focus-visible {
      outline: 2px solid var(--ink);
      outline-offset: 4px;
    }
    .date-button[aria-pressed="true"] {
      color: var(--ink);
      text-decoration: underline;
      text-decoration-thickness: 1.5px;
      text-underline-offset: 0.22em;
      text-decoration-color: var(--ink);
    }

    .control-word {
      all: unset;
      display: inline-block;
      vertical-align: baseline;
      cursor: pointer;
      color: var(--ink);
      font: inherit;
      font-style: inherit;
      text-decoration: underline;
      text-decoration-thickness: 1.5px;
      text-underline-offset: 0.22em;
      text-decoration-color: var(--ink);
      opacity: 1;
      transform: translateX(0);
      transition:
        opacity 0.5s var(--ease-out),
        transform 0.5s var(--ease-out),
        width 0.5s var(--ease-out);
    }
    .control-word:hover:not(.is-fading):not(.is-entering) { opacity: 0.7; }
    .control-word.is-fading {
      opacity: 0;
      transform: translateX(-0.35em);
    }
    .control-word.is-entering {
      opacity: 0;
      transform: translateX(0.35em);
    }
    .control-word:focus-visible {
      outline: 2px solid var(--ink);
      outline-offset: 4px;
    }

    .filter-bar {
      position: relative;
      display: inline-block;
    }
    .filter-toggle {
      display: inline;
      vertical-align: baseline;
      opacity: 1;
      transform: translateX(0);
      transition:
        opacity 0.5s var(--ease-out),
        transform 0.5s var(--ease-out),
        width 0.5s var(--ease-out);
    }
    .filter-toggle.is-fading {
      opacity: 0;
      transform: translateX(-0.35em);
    }
    .filter-toggle.is-entering {
      opacity: 0;
      transform: translateX(0.35em);
    }

    .filter-menu {
      position: absolute;
      top: calc(100% + var(--space-3));
      left: 0;
      min-width: 22rem;
      display: grid;
      grid-template-rows: 0fr;
      transition:
        grid-template-rows 280ms var(--ease-out),
        opacity 200ms var(--ease-out);
      opacity: 0;
      pointer-events: none;
      z-index: 10;
    }
    .filter-menu[data-open="true"] {
      grid-template-rows: 1fr;
      opacity: 1;
      pointer-events: auto;
    }
    .filter-menu-inner {
      overflow: hidden;
      min-height: 0;
    }
    .filter-menu-panel {
      background: var(--paper);
      border: 1px solid var(--ink);
      padding: var(--space-4) var(--space-6);
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
    }
    .filter-menu-panel .filter-meta {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: var(--space-4);
      padding-bottom: var(--space-3);
      margin-bottom: var(--space-2);
      border-bottom: 1px solid var(--rule);
    }
    .filter-meta-label {
      font-family: var(--ff-body);
      font-style: italic;
      font-size: var(--t-sm);
      color: var(--ink-soft);
    }
    .filter-meta button {
      all: unset;
      cursor: pointer;
      font-family: var(--ff-body);
      font-style: italic;
      font-size: var(--t-sm);
      color: var(--ink-mute);
      text-decoration: underline;
      text-decoration-thickness: 1px;
      text-underline-offset: 0.2em;
      transition: color 160ms;
    }
    .filter-meta button:hover { color: var(--ink); }
    .filter-meta button:focus-visible {
      outline: 2px solid var(--ink);
      outline-offset: 4px;
    }

    .filter-options {
      display: flex;
      flex-direction: column;
      gap: 0.15em;
    }
    .filter-venue {
      all: unset;
      cursor: pointer;
      font-family: var(--ff-body);
      font-size: var(--t-md);
      color: var(--ink-mute);
      padding: 0.2em 0;
      transition: color 160ms;
    }
    .filter-venue:hover { color: var(--ink-soft); }
    .filter-venue[aria-pressed="true"] {
      color: var(--ink);
      font-weight: 500;
    }
    .filter-venue:focus-visible {
      outline: 2px solid var(--ink);
      outline-offset: 3px;
    }

    /* ---------- Movie list ---------- */
    .movies {
      display: flex;
      flex-direction: column;
      opacity: 1;
      transition: opacity 0.5s var(--ease-out);
    }
    .movies.is-fading { opacity: 0; }
    .movie {
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
      padding: var(--space-12) 0;
      border-bottom: 1px solid var(--rule);
      opacity: 1;
      transition: opacity 0.5s var(--ease-out);
    }
    .movie.is-fading { opacity: 0; }
    .movie:last-child { border-bottom: none; }

    .movie-meta {
      font-family: var(--ff-body);
      font-style: italic;
      font-size: var(--t-md);
      color: var(--ink-soft);
      margin: 0;
    }
    .movie-meta .sep {
      display: inline-block;
      margin: 0 0.55em;
      color: var(--rule);
    }

    .movie-title {
      font-family: var(--ff-display);
      font-weight: 700;
      font-size: var(--t-title);
      line-height: 0.95;
      letter-spacing: -0.01em;
      margin: 0;
      max-width: 28ch;
    }

    /* Synopsis — always visible */
    .movie-synopsis {
      margin: 0;
      width: 75%;
      max-width: 65ch;
    }
    .movie-synopsis p {
      margin: 0;
      font-size: var(--t-md);
      font-weight: 300;
      line-height: 1.55;
      color: var(--ink-mute);
    }

    /* ---------- Venues — one theater, format subsections ---------- */
    .showings {
      display: flex;
      flex-direction: column;
      margin-top: var(--space-4);
    }
    .venue {
      display: grid;
      grid-template-columns: minmax(10rem, 18rem) 1fr;
      column-gap: var(--space-8);
      align-items: start;
      padding: var(--space-6) 0;
      border-bottom: 1px solid var(--rule);
    }
    .venue:first-child { padding-top: 0; }
    .venue:last-child { border-bottom: none; padding-bottom: 0; }
    @media (max-width: 640px) {
      .venue {
        grid-template-columns: 1fr;
        row-gap: var(--space-3);
      }
    }

    .venue-name {
      margin: 0;
      font-family: var(--ff-display);
      font-weight: 700;
      font-size: var(--t-lg);
      color: var(--ink);
      line-height: 1.15;
      letter-spacing: -0.01em;
    }
    .venue-formats {
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
      min-width: 0;
    }
    /* Rule between format rows only when venue has 3+ formats */
    .venue-formats.many-formats .format-row {
      padding-bottom: var(--space-4);
      border-bottom: 1px solid var(--rule);
    }
    .venue-formats.many-formats .format-row:last-child {
      padding-bottom: 0;
      border-bottom: none;
    }
    .format-row {
      display: grid;
      grid-template-columns: minmax(7rem, 11rem) 1fr;
      column-gap: var(--space-6);
      align-items: baseline;
    }
    @media (max-width: 640px) {
      .format-row {
        grid-template-columns: 1fr;
        row-gap: var(--space-2);
      }
    }
    .format-label {
      font-family: var(--ff-body);
      font-style: italic;
      font-weight: 300;
      font-size: var(--t-sm);
      color: var(--ink-soft);
      line-height: 1.35;
    }
    .format-label::before {
      content: "— ";
      color: var(--ink-mute);
    }

    /* Showtimes right-aligned — TV grid scan */
    .showtimes {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: var(--space-3) var(--space-4);
      font-family: var(--ff-body);
      font-weight: 400;
      font-variant-numeric: tabular-nums lining-nums;
      font-size: var(--t-lg);
      color: var(--ink);
      text-align: right;
    }
    @media (max-width: 640px) {
      .showtimes { justify-content: flex-start; text-align: left; }
    }

    .showtime {
      display: inline-flex;
      flex-direction: column;
      align-items: flex-end;
      white-space: nowrap;
      line-height: 1.1;
    }
    @media (max-width: 640px) {
      .showtime { align-items: flex-start; }
    }
    .showtime-time {
      font-size: 1em;
      line-height: 1.1;
    }
    /* Accent use #2 — single dot beside next upcoming showtime (page-wide) */
    .showtime.next-up .showtime-time::before {
      content: "";
      display: inline-block;
      width: 0.4em;
      height: 0.4em;
      border-radius: 50%;
      background: var(--accent);
      margin-right: 0.45em;
      vertical-align: 0.12em;
    }
    .showtime-end {
      font-family: var(--ff-body);
      font-style: italic;
      font-weight: 300;
      font-size: var(--t-xs);
      color: var(--ink-mute);
      margin-top: 0.35em;
      height: 1em;
      line-height: 1;
      opacity: 0;
      transition: opacity 500ms var(--ease-out);
      pointer-events: none;
    }
    .showtime:hover .showtime-end,
    .showtime:focus-within .showtime-end { opacity: 1; }
    .showtime.past .showtime-time {
      color: var(--ink-mute);
      font-style: italic;
      font-weight: 300;
    }

    .empty-state {
      padding: var(--space-12) 0;
      font-family: var(--ff-body);
      font-style: italic;
      font-size: var(--t-lg);
      color: var(--ink-mute);
      max-width: 42ch;
    }

    @media (prefers-reduced-motion: reduce) {
      .control-word,
      .filter-toggle,
      .movies,
      .movie,
      .showtime-end { transition: none; }
      .filter-menu { transition: none; }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="masthead">
      <h1>Now Showing&hellip;</h1>
      <p class="masthead-tag" id="masthead-date-text"></p>

      <div class="control-bar">
        <div class="control-sentence">
          Showing
          <button
            type="button"
            class="control-word"
            id="sort-toggle"
            aria-label="Toggle sort order"
          >widely shown</button>
          movies from
          <span class="filter-bar">
            <button
              type="button"
              class="control-word filter-toggle"
              aria-expanded="false"
              aria-controls="theater-menu"
              aria-haspopup="true"
            >
              <span class="filter-summary">all theaters</span>
            </button>
            <div
              class="filter-menu"
              id="theater-menu"
              role="group"
              aria-label="Filter by theater"
              data-open="false"
            >
              <div class="filter-menu-inner">
                <div class="filter-menu-panel">
                  <div class="filter-meta">
                    <span class="filter-meta-label">Playing at</span>
                    <button type="button" data-filter-action="all">None</button>
                  </div>
                  <div class="filter-options"></div>
                </div>
              </div>
            </div>
          </span>
        </div>
      </div>

      <div class="date-bar">
        <div class="date-buttons" role="group" aria-label="Select date"></div>
      </div>
    </header>

    <section class="movies" id="movie-list"></section>
  </main>

  <template id="tpl-movie">
    <article class="movie">
      <p class="movie-meta"></p>
      <h2 class="movie-title"></h2>
      <div class="movie-synopsis">
        <p></p>
      </div>
      <div class="showings"></div>
    </article>
  </template>

  <script>
    let movieMeta = {};
    let moviesByDay = [];
    let dateRange = [];
    let ALL_THEATERS = [];
    let selectedTheaters = new Set();
    let currentSort = "widely";
    let selectedDayIndex = 0;
    let VIEW_NOW = new Date();

    function titleCaseDisplay(input) {
      const s = String(input || "");
      if (/[a-z]/.test(s)) return s;
      return s.toLowerCase().replace(
        /(^|[\s\-:'"\(])([a-z])/g,
        (_, sep, ch) => sep + ch.toUpperCase()
      );
    }

    function parseShowtime(str, baseDate) {
      const m = String(str).trim().toLowerCase().match(/^(\d{1,2}):(\d{2})(am|pm)$/);
      if (!m) return null;
      let h = parseInt(m[1], 10);
      const min = parseInt(m[2], 10);
      if (m[3] === "pm" && h !== 12) h += 12;
      if (m[3] === "am" && h === 12) h = 0;
      const d = new Date(baseDate);
      d.setHours(h, min, 0, 0);
      return d;
    }

    function resolveNow() {
      const params = new URLSearchParams(window.location.search);
      const override = params.get("now");
      if (override) {
        const m = override.match(/^(\d{1,2}):(\d{2})$/);
        if (m) {
          const d = new Date();
          d.setHours(parseInt(m[1], 10), parseInt(m[2], 10), 0, 0);
          return d;
        }
      }
      return new Date();
    }

    function fmtTime(t) { return t.replace(/(am|pm)$/i, "\u202F$1"); }

    function fmtClock(date) {
      let h = date.getHours();
      const min = date.getMinutes();
      const ampm = h >= 12 ? "pm" : "am";
      h = h % 12;
      if (h === 0) h = 12;
      return `${h}:${String(min).padStart(2, "0")}\u202F${ampm}`;
    }

    function fullDateSentence(d) {
      const opts = { weekday: "long", month: "long", day: "numeric", year: "numeric" };
      const formatted = d.toLocaleDateString(undefined, opts);
      return `The date is <span class="masthead-date">${formatted}</span>.`;
    }

    function fmtDateButtonLabel(d) {
      const weekday = d.toLocaleDateString(undefined, { weekday: "short" }).replace(/\.$/, "");
      const month = d.toLocaleDateString(undefined, { month: "short" });
      return `${weekday}, ${month} ${d.getDate()}`;
    }

    function startOfDay(d) {
      const copy = new Date(d);
      copy.setHours(0, 0, 0, 0);
      return copy;
    }

    function detectChain(theaterName) {
      const n = String(theaterName || "").toLowerCase();
      if (n.includes("alamo")) return "alamo";
      if (n.includes("amc"))   return "amc";
      return null;
    }

    function bufferMinutes(chain) {
      if (chain === "alamo") return Math.round((10 + 13) / 2);
      return Math.round((25 + 30) / 2);
    }

    function computeEndApprox(startStr, baseDate, runtimeMin, chain) {
      if (!runtimeMin) return null;
      const start = parseShowtime(startStr, baseDate);
      if (!start) return null;
      const offsetMin = bufferMinutes(chain) + runtimeMin;
      return new Date(start.getTime() + offsetMin * 60000);
    }

    function formatEndApprox(end, isPast) {
      if (!end) return "";
      return `${isPast ? "ended" : "ends"} ~${fmtClock(end)}`;
    }

    function formatRuntime(mins) {
      if (!mins || mins <= 0) return null;
      const h = Math.floor(mins / 60);
      const m = mins % 60;
      if (h === 0) return `${m}m`;
      if (m === 0) return `${h}h`;
      return `${h}h ${m}m`;
    }

    function parseDateKey(key) {
      const [y, m, d] = key.split("-").map(Number);
      return new Date(y, m - 1, d);
    }

    function extractDateKeys(scraped) {
      const set = new Set();
      Object.values(scraped).forEach((theater) => {
        Object.keys(theater.data || {}).forEach((dateKey) => set.add(dateKey));
      });
      return [...set].sort().slice(0, 7);
    }

    function buildMoviesByDay(scraped, dateKeys) {
      return dateKeys.map((dateKey) => {
        const byTitle = new Map();
        Object.entries(scraped).forEach(([theaterName, theater]) => {
          const day = theater.data?.[dateKey];
          if (!day) return;
          Object.entries(day).forEach(([title, payload]) => {
            if (!byTitle.has(title)) {
              byTitle.set(title, { title, theaters: [] });
            }
            byTitle.get(title).theaters.push({
              name: theaterName,
              formats: (payload.formats || []).map((fmt) => ({
                name: fmt.format_name,
                tags: fmt.attributes || [],
                times: fmt.showtimes || [],
              })),
            });
          });
        });
        return [...byTitle.values()];
      });
    }

    function metaYear(meta) {
      if (meta?.release_date != null && meta.release_date !== "") {
        return String(meta.release_date).slice(0, 4);
      }
      return null;
    }

    function metaRuntimeLabel(meta) {
      if (meta?.runtime) return formatRuntime(meta.runtime);
      return null;
    }

    function metaOverview(meta) {
      if (meta?.overview) return meta.overview;
      return null;
    }

    function totalShowtimes(movie, theaterFilter) {
      return movie.theaters
        .filter((t) => !theaterFilter || theaterFilter.has(t.name))
        .reduce((n, t) => n + t.formats.reduce((m, f) => m + f.times.length, 0), 0);
    }
    function chainShowtimes(movie, chain, theaterFilter) {
      return movie.theaters
        .filter((t) => (!theaterFilter || theaterFilter.has(t.name)) && detectChain(t.name) === chain)
        .reduce((n, t) => n + t.formats.reduce((m, f) => m + f.times.length, 0), 0);
    }

    function sortMovies(list, mode, theaterFilter) {
      const sorted = [...list];
      sorted.sort((a, b) => {
        const aTotal = totalShowtimes(a, theaterFilter);
        const bTotal = totalShowtimes(b, theaterFilter);
        const primary = mode === "rare" ? aTotal - bTotal : bTotal - aTotal;
        if (primary !== 0) return primary;
        const aDelta = chainShowtimes(a, "alamo", theaterFilter) - chainShowtimes(a, "amc", theaterFilter);
        const bDelta = chainShowtimes(b, "alamo", theaterFilter) - chainShowtimes(b, "amc", theaterFilter);
        return bDelta - aDelta;
      });
      return sorted;
    }

    function collectAllTheaters(list) {
      const set = new Set();
      list.forEach((m) => m.theaters.forEach((t) => set.add(t.name)));
      return [...set].sort((a, b) => {
        const ca = detectChain(a) || "z";
        const cb = detectChain(b) || "z";
        if (ca !== cb) return ca.localeCompare(cb);
        return a.localeCompare(b);
      });
    }

    function getActiveMovies() {
      return moviesByDay[selectedDayIndex] || [];
    }

    function getViewNow() {
      const today = startOfDay(new Date());
      const viewDay = startOfDay(dateRange[selectedDayIndex]);
      if (viewDay.getTime() > today.getTime()) return viewDay;
      if (viewDay.getTime() < today.getTime()) {
        const end = new Date(viewDay);
        end.setHours(23, 59, 0, 0);
        return end;
      }
      return resolveNow();
    }

    function applyTheaterFilter(list) {
      if (selectedTheaters.size === 0) return [];
      return list
        .filter((m) => m.theaters.some((t) => selectedTheaters.has(t.name)))
        .map((m) => ({
          ...m,
          theaters: m.theaters.filter((t) => selectedTheaters.has(t.name)),
        }));
    }

    const tpl = document.getElementById("tpl-movie");
    const list = document.getElementById("movie-list");
    const mastheadDateEl = document.getElementById("masthead-date-text");
    const controlSentence = document.querySelector(".control-sentence");
    const dateButtonsEl = document.querySelector(".date-buttons");
    const FADE_MS = 500;
    let fadeTimeout = null;
    let fadingControl = null;

    function setMoviesFading(fading) {
      list.classList.toggle("is-fading", fading);
      list.querySelectorAll(".movie").forEach((node) => {
        node.classList.toggle("is-fading", fading);
      });
    }

    function lockControlWidth(el) {
      el.style.width = `${el.offsetWidth}px`;
      el.style.overflow = "hidden";
    }

    function releaseControlWidth(el) {
      el.style.width = "";
      el.style.overflow = "";
    }

    function measureControlWidth(el) {
      const clone = el.cloneNode(true);
      clone.style.position = "absolute";
      clone.style.visibility = "hidden";
      clone.style.width = "auto";
      clone.style.overflow = "visible";
      clone.style.pointerEvents = "none";
      clone.classList.remove("is-fading", "is-entering");
      el.parentElement.appendChild(clone);
      const width = clone.offsetWidth;
      clone.remove();
      return width;
    }

    function resetControlAnimation(el) {
      if (!el) return;
      el.classList.remove("is-fading", "is-entering");
      releaseControlWidth(el);
      controlSentence.classList.remove("is-transitioning");
    }

    function beginControlExit(el) {
      if (!el) return;
      controlSentence.classList.add("is-transitioning");
      lockControlWidth(el);
      el.classList.remove("is-entering");
      el.classList.add("is-fading");
    }

    function finishControlEnter(el) {
      if (!el) return;
      const newWidth = measureControlWidth(el);
      el.classList.add("is-entering");
      el.classList.remove("is-fading");
      requestAnimationFrame(() => {
        el.classList.remove("is-entering");
        el.style.width = `${newWidth}px`;
      });
      setTimeout(() => {
        releaseControlWidth(el);
        controlSentence.classList.remove("is-transitioning");
      }, FADE_MS);
    }

    function markNextGlobalShowtime(container) {
      container.querySelectorAll(".showtime.next-up").forEach((el) => {
        el.classList.remove("next-up");
      });
      const now = VIEW_NOW.getTime();
      let best = null;
      let bestEl = null;
      container.querySelectorAll(".showtime[data-start]").forEach((el) => {
        const t = parseInt(el.dataset.start, 10);
        if (t >= now && (best === null || t < best)) {
          best = t;
          bestEl = el;
        }
      });
      if (bestEl) bestEl.classList.add("next-up");
    }

    function updateMastheadDate() {
      const d = dateRange[selectedDayIndex] || new Date();
      mastheadDateEl.innerHTML = fullDateSentence(d);
    }

    function renderContent() {
      VIEW_NOW = getViewNow();
      const filtered = applyTheaterFilter(getActiveMovies());
      if (filtered.length === 0) {
        renderEmptyState();
      } else {
        const sorted = sortMovies(filtered, currentSort, selectedTheaters);
        list.innerHTML = "";
        sorted.forEach((m) => list.appendChild(buildMovieNode(m)));
        markNextGlobalShowtime(list);
      }
    }

    function updateControls() {
      updateMastheadDate();
      updateSortWord();
      updateFilterSummary();
      updateAllNoneButton();
      updateDateButtons();
    }

    function updateDateButtons() {
      dateButtonsEl.querySelectorAll(".date-button").forEach((btn, i) => {
        btn.setAttribute("aria-pressed", String(i === selectedDayIndex));
      });
    }

    function buildDateButtons() {
      dateButtonsEl.innerHTML = "";
      dateRange.forEach((d, i) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "date-button";
        btn.textContent = fmtDateButtonLabel(d);
        btn.setAttribute("aria-pressed", String(i === selectedDayIndex));
        btn.addEventListener("click", () => {
          if (selectedDayIndex === i) return;
          selectedDayIndex = i;
          render();
        });
        dateButtonsEl.appendChild(btn);
      });
    }

    function render({ immediate = false, source = null } = {}) {
      clearTimeout(fadeTimeout);
      const prefersReducedMotion =
        window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      if (immediate || prefersReducedMotion) {
        resetControlAnimation(fadingControl);
        fadingControl = null;
        setMoviesFading(false);
        renderContent();
        updateControls();
        return;
      }

      resetControlAnimation(fadingControl);
      fadingControl = source;
      if (source) beginControlExit(source);
      setMoviesFading(true);

      fadeTimeout = setTimeout(() => {
        renderContent();
        updateControls();
        if (source) finishControlEnter(source);
        setMoviesFading(false);
      }, FADE_MS);
    }

    function buildFormatLabel(fmt) {
      const parts = [fmt.name];
      if (fmt.tags?.length) parts.push(...fmt.tags);
      return parts.join(" · ");
    }

    function buildMovieNode(movie) {
      const node = tpl.content.firstElementChild.cloneNode(true);
      node.querySelector(".movie-title").textContent =
        titleCaseDisplay(movie.title);

      const meta = movieMeta[movie.title];
      const overview = metaOverview(meta);
      const synopsis = node.querySelector(".movie-synopsis");
      if (overview) {
        synopsis.querySelector("p").textContent = overview;
      } else {
        synopsis.remove();
      }


      const total = movie.theaters.reduce(
        (n, t) => n + t.formats.reduce((m, f) => m + f.times.length, 0),
        0
      );
      const parts = [
        metaYear(meta),
        metaRuntimeLabel(meta),
        `${total} showing${total === 1 ? "" : "s"}`,
      ].filter(Boolean);
      node.querySelector(".movie-meta").innerHTML =
        parts.join('<span class="sep">·</span>');

      const showings = node.querySelector(".showings");
      movie.theaters.forEach((theater) => {
        const chain = detectChain(theater.name);
        const venue = document.createElement("div");
        venue.className = "venue";

        const name = document.createElement("h3");
        name.className = "venue-name";
        name.textContent = theater.name;
        venue.appendChild(name);

        const formatsWrap = document.createElement("div");
        formatsWrap.className = "venue-formats" +
          (theater.formats.length >= 3 ? " many-formats" : "");

        theater.formats.forEach((fmt) => {
          const row = document.createElement("div");
          row.className = "format-row";

          const formatLabel = document.createElement("span");
          formatLabel.className = "format-label";
          formatLabel.textContent = buildFormatLabel(fmt);
          row.appendChild(formatLabel);

          const times = document.createElement("div");
          times.className = "showtimes";
          fmt.times.forEach((t) => {
            const cell = document.createElement("span");
            cell.className = "showtime";

            const parsed = parseShowtime(t, VIEW_NOW);
            const isPast = !!parsed && parsed.getTime() < VIEW_NOW.getTime();
            if (parsed) cell.dataset.start = String(parsed.getTime());
            if (isPast) cell.classList.add("past");

            const time = document.createElement("span");
            time.className = "showtime-time";
            time.textContent = fmtTime(t);
            cell.appendChild(time);

            const end = document.createElement("span");
            end.className = "showtime-end";
            end.textContent = formatEndApprox(
              computeEndApprox(t, VIEW_NOW, meta?.runtime, chain),
              isPast
            );
            cell.appendChild(end);
            times.appendChild(cell);
          });
          row.appendChild(times);
          formatsWrap.appendChild(row);
        });

        venue.appendChild(formatsWrap);
        showings.appendChild(venue);
      });

      return node;
    }

    function renderEmptyState() {
      list.innerHTML = "";
      const p = document.createElement("p");
      p.className = "empty-state";
      p.textContent =
        selectedTheaters.size === 0
          ? "No theaters selected — choose at least one venue above."
          : "Nothing playing at the selected venues on this date.";
      list.appendChild(p);
    }

    const sortToggle = document.getElementById("sort-toggle");

    function updateSortWord() {
      sortToggle.textContent =
        currentSort === "rare" ? "rarer" : "widely shown";
    }

    sortToggle.addEventListener("click", () => {
      currentSort = currentSort === "rare" ? "widely" : "rare";
      render({ source: sortToggle });
    });

    const filterToggle = document.querySelector(".filter-toggle");
    const filterMenu   = document.getElementById("theater-menu");
    const filterSummary = document.querySelector(".filter-summary");
    const filterOptions = document.querySelector(".filter-options");
    const allNoneButton = document.querySelector('[data-filter-action="all"]');

    function updateFilterSummary() {
      const total = ALL_THEATERS.length;
      const sel = selectedTheaters.size;
      if (sel === total)     filterSummary.textContent = "all theaters";
      else if (sel === 0)    filterSummary.textContent = "no theaters";
      else if (sel === 1) {
        filterSummary.textContent = [...selectedTheaters][0];
      } else                 filterSummary.textContent = `${sel} of ${total} theaters`;
    }

    function updateAllNoneButton() {
      const allOn = selectedTheaters.size === ALL_THEATERS.length;
      allNoneButton.textContent = allOn ? "None" : "All";
    }

    function buildFilterOptions() {
      filterOptions.innerHTML = "";
      ALL_THEATERS.forEach((name) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "filter-venue";
        btn.textContent = name;
        btn.setAttribute("aria-pressed", String(selectedTheaters.has(name)));
        btn.addEventListener("click", () => {
          if (selectedTheaters.has(name)) selectedTheaters.delete(name);
          else selectedTheaters.add(name);
          btn.setAttribute("aria-pressed", String(selectedTheaters.has(name)));
          render({ source: filterToggle });
        });
        filterOptions.appendChild(btn);
      });
    }

    function setMenuOpen(open) {
      filterToggle.setAttribute("aria-expanded", String(open));
      filterMenu.setAttribute("data-open", String(open));
    }

    filterToggle.addEventListener("click", (e) => {
      e.stopPropagation();
      const isOpen = filterToggle.getAttribute("aria-expanded") === "true";
      setMenuOpen(!isOpen);
    });
    filterMenu.addEventListener("click", (e) => e.stopPropagation());
    document.addEventListener("click", () => setMenuOpen(false));
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") setMenuOpen(false);
    });

    allNoneButton.addEventListener("click", () => {
      const allOn = selectedTheaters.size === ALL_THEATERS.length;
      selectedTheaters = allOn ? new Set() : new Set(ALL_THEATERS);
      buildFilterOptions();
      render({ source: filterToggle });
    });

    async function initApp() {
      list.innerHTML = '<p class="empty-state">Loading showtimes…</p>';
      try {
        const [scraped, tmdb] = await Promise.all([
          fetch("../overall_scraped.json").then((r) => {
            if (!r.ok) throw new Error("overall_scraped.json");
            return r.json();
          }),
          fetch("../tmdb_metadata.json").then((r) => {
            if (!r.ok) throw new Error("tmdb_metadata.json");
            return r.json();
          }),
        ]);
        movieMeta = tmdb;
        const dateKeys = extractDateKeys(scraped);
        dateRange = dateKeys.map(parseDateKey);
        moviesByDay = buildMoviesByDay(scraped, dateKeys);
        ALL_THEATERS = collectAllTheaters(moviesByDay.flat());
        selectedTheaters = new Set(ALL_THEATERS);
        selectedDayIndex = 0;
        buildDateButtons();
        buildFilterOptions();
        render({ immediate: true });
      } catch (err) {
        console.error(err);
        list.innerHTML = "";
        const p = document.createElement("p");
        p.className = "empty-state";
        p.textContent =
          "Could not load showtime data. Open this mockup through a local web server.";
        list.appendChild(p);
      }
    }

    initApp();
  </script>
</body>
</html>
